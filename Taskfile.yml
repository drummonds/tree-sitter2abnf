version: "3"

vars:
  MODULE: github.com/drummonds/tree-sitter2abnf

tasks:
  fmt:
    desc: Format code
    cmds:
      - go fmt ./...

  vet:
    desc: Vet code
    cmds:
      - go vet ./...

  test:
    desc: Run tests
    cmds:
      - go test ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  check:
    desc: Format, vet, lint, and test
    cmds:
      - task: fmt
      - task: vet
      - task: lint
      - task: test

  build:
    desc: Build binary
    cmds:
      - go build -o tree-sitter2abnf ./cmd/tree-sitter2abnf

  docs:build:
    desc: Build documentation (markdown to HTML)
    cmds:
      - task-plus md2html --file index.md --dst docs
      - task-plus md2html --file README.md --dst docs
      - task-plus md2html --file CHANGELOG.md --dst docs
      - task-plus md2html --file ROADMAP.md --dst docs

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -f tree-sitter2abnf
      - rm -rf dist/
      - rm -f docs/*.html

  deps:tidy:
    desc: Tidy dependencies
    cmds:
      - go mod tidy


