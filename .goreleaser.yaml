version: 2

builds:
  - main: ./cmd/tree-sitter2abnf
    binary: tree-sitter2abnf
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip

release:
  github:
    owner: drummonds
    name: tree-sitter2abnf

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
